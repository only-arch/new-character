<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>신캐 스포 생성기</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #050608;
      --panel: #101114;
      --panel-2: #17181c;
      --line: rgba(255,255,255,0.12);
      --text: #ffffff;
      --subtext: rgba(255,255,255,0.78);
      --muted: rgba(255,255,255,0.45);
    }

    html, body {
      margin: 0;
      padding: 0;
      background: #050608;
      color: var(--text);
      font-family: 'Noto Sans KR', sans-serif;
    }

    body {
      padding: 24px;
    }

    .wrap {
      width: min(980px, 100%);
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .notice-box,
    .panel {
      background: linear-gradient(180deg, rgba(18,19,24,0.96), rgba(10,11,14,0.98));
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.22);
    }

    .notice-box {
      padding: 18px 20px;
      font-size: 14px;
      line-height: 1.8;
      color: rgba(255,255,255,0.82);
      word-break: keep-all;
    }

    .panel {
      padding: 18px;
    }

    .controls {
      display: grid;
      gap: 14px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field label {
      font-size: 13px;
      font-weight: 800;
      color: rgba(255,255,255,0.92);
    }

    .field input[type="text"],
    .field input[type="file"],
    .field textarea {
      width: 100%;
      border: 0;
      outline: 0;
      border-radius: 10px;
      padding: 14px 14px;
      background: linear-gradient(90deg, rgba(26,27,31,1), rgba(20,21,25,1));
      color: #fff;
      font-size: 15px;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .field textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    .field input::placeholder,
    .field textarea::placeholder {
      color: rgba(255,255,255,0.28);
    }

    .button-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      outline: 0;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Noto Sans KR', sans-serif;
    }

    .save-btn {
      background: #ffffff;
      color: #111;
    }

    .reset-btn {
      background: #23252c;
      color: #fff;
    }

    .preview-shell {
      padding: 0;
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      min-height: 560px;
      overflow: hidden;
      background: #020305;
      border-radius: 16px;
      isolation: isolate;
    }

    .bg-image {
      position: absolute;
      inset: 0;
      z-index: 0;
      background-color: #020305;
      background-image: none;
      background-size: cover;
      background-position: center center;
      background-repeat: no-repeat;
      transform: scale(1.02);
      filter: brightness(0.42) saturate(0.84) contrast(1.02);
    }

    .overlay-1 {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        linear-gradient(to bottom, rgba(0,0,0,0.28), rgba(0,0,0,0.54)),
        radial-gradient(circle at center, rgba(255,255,255,0.02) 0%, rgba(0,0,0,0.18) 38%, rgba(0,0,0,0.62) 100%);
      pointer-events: none;
    }

    .overlay-2 {
      position: absolute;
      inset: 0;
      z-index: 2;
      background:
        radial-gradient(circle at 50% 28%, rgba(140,165,255,0.05), rgba(255,255,255,0) 26%),
        radial-gradient(circle at 50% 72%, rgba(255,255,255,0.02), rgba(255,255,255,0) 30%);
      pointer-events: none;
      mix-blend-mode: screen;
    }

    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      height: 100%;
      min-height: 560px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 32px;
    }

    .inner {
      width: min(860px, 100%);
    }

    .soon {
      margin: 0 0 28px;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(15px, 1.3vw, 24px);
      font-weight: 700;
      letter-spacing: 0.34em;
      color: rgba(255,255,255,0.72);
      text-transform: uppercase;
    }

    .sub-title {
      margin: 0;
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(44px, 4.4vw, 72px);
      font-weight: 800;
      line-height: 1.02;
      letter-spacing: -0.04em;
      color: #ffffff;
    }

    .main-title {
      margin: 34px 0 28px;
      font-family: 'Montserrat', 'Noto Sans KR', sans-serif;
      font-size: clamp(86px, 9vw, 144px);
      font-weight: 900;
      line-height: 0.92;
      letter-spacing: -0.07em;
      color: #ffffff;
      text-shadow:
        0 6px 24px rgba(0,0,0,0.30),
        0 0 26px rgba(255,255,255,0.04);
    }

    .divider {
      width: min(640px, 100%);
      height: 1px;
      margin: 0 auto 32px;
      background: linear-gradient(
        to right,
        rgba(255,255,255,0),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.28),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0)
      );
    }

    .trait {
      margin: 0;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: clamp(24px, 2.2vw, 40px);
      font-weight: 800;
      line-height: 1.35;
      color: #ffffff;
    }

    .desc {
      margin: 28px auto 0;
      max-width: 700px;
      font-family: 'Noto Sans KR', sans-serif;
      font-size: clamp(17px, 1.5vw, 28px);
      font-weight: 500;
      line-height: 1.8;
      color: rgba(255,255,255,0.72);
      font-style: italic;
      transform: skewX(-10deg);
      transform-origin: center;
      white-space: pre-line;
    }

    .empty-guide {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 4;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      color: rgba(255,255,255,0.64);
      pointer-events: none;
    }

    .card.has-image .empty-guide {
      display: none;
    }

    @media (max-width: 720px) {
      body {
        padding: 14px;
      }

      .card,
      .content {
        min-height: 100vw;
      }

      .content {
        padding: 34px 18px;
      }

      .button-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
      }

      .desc {
        transform: skewX(-8deg);
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="notice-box">
      ※ 케이브덕/로판AI의 체리망고님의 신캐스포창처럼 이미지 저장이 가능한 사이트입니다.<br>
      배포 관련해서는 체리망고님의 허락이 있었으며, 아크 유저캐만 사용하는 것을 허용합니다.<br>
      타장르 캐릭터 및 기존 아크 캐릭터로 사용하는 것이 확인될 경우 즉시 삭제됩니다.
    </div>

    <div class="panel">
      <div class="controls">
        <div class="field">
          <label for="imageInput">이미지 업로드</label>
          <input type="file" id="imageInput" accept="image/*">
        </div>

        <div class="field">
          <label for="nameInput">캐릭터 이름</label>
          <input type="text" id="nameInput" value="Rêve" placeholder="예: Rêve">
        </div>

        <div class="field">
          <label for="traitInput">속성 설명</label>
          <input type="text" id="traitInput" value="B급 풀 속성 센티넬" placeholder="예: B급 풀 속성 센티넬">
        </div>

        <div class="field">
          <label for="descInput">캐치프레이즈를 작성해주세요.</label>
          <textarea id="descInput" placeholder="캐치프레이즈를 작성해주세요.">캐치프레이즈를 작성하는데
2줄이 가장 예뻐요</textarea>
        </div>

        <div class="field">
          <label for="fileNameInput">파일명 (예: reve-신캐스포창)</label>
          <input type="text" id="fileNameInput" value="reve-신캐스포창" placeholder="예: reve-신캐스포창">
        </div>

        <div class="button-row">
          <button class="save-btn" id="saveBtn" type="button">이미지 저장</button>
          <button class="reset-btn" id="resetBtn" type="button">입력 초기화</button>
        </div>
      </div>
    </div>

    <div class="preview-shell">
      <section class="card" id="captureTarget">
        <div class="bg-image" id="bgImage"></div>
        <div class="overlay-1"></div>
        <div class="overlay-2"></div>

        <div class="content">
          <div class="inner">
            <p class="soon">COMING SOON</p>
            <h2 class="sub-title">new character</h2>
            <h1 class="main-title" id="previewName">Rêve</h1>
            <div class="divider"></div>
            <p class="trait" id="previewTrait">B급 풀 속성 센티넬</p>
            <p class="desc" id="previewDesc">캐치프레이즈를 작성하는데
2줄이 가장 예뻐요</p>
          </div>
        </div>

        <div class="empty-guide">이미지를 업로드하면 배경에 바로 적용됩니다</div>
      </section>
    </div>
  </div>

  <script>
    const imageInput = document.getElementById('imageInput');
    const nameInput = document.getElementById('nameInput');
    const traitInput = document.getElementById('traitInput');
    const descInput = document.getElementById('descInput');
    const fileNameInput = document.getElementById('fileNameInput');

    const previewName = document.getElementById('previewName');
    const previewTrait = document.getElementById('previewTrait');
    const previewDesc = document.getElementById('previewDesc');
    const bgImage = document.getElementById('bgImage');
    const captureTarget = document.getElementById('captureTarget');

    const saveBtn = document.getElementById('saveBtn');
    const resetBtn = document.getElementById('resetBtn');

    function updatePreview() {
      previewName.textContent = nameInput.value || 'Rêve';
      previewTrait.textContent = traitInput.value || 'B급 풀 속성 센티넬';
      previewDesc.textContent = descInput.value || '캐치프레이즈를 작성하는데\n2줄이 가장 예뻐요';
    }

    nameInput.addEventListener('input', updatePreview);
    traitInput.addEventListener('input', updatePreview);
    descInput.addEventListener('input', updatePreview);

    imageInput.addEventListener('change', (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = (event) => {
        bgImage.style.backgroundImage = `url("${event.target.result}")`;
        captureTarget.classList.add('has-image');
      };
      reader.readAsDataURL(file);
    });

    resetBtn.addEventListener('click', () => {
      imageInput.value = '';
      nameInput.value = 'Rêve';
      traitInput.value = 'B급 풀 속성 센티넬';
      descInput.value = '캐치프레이즈를 작성하는데\n2줄이 가장 예뻐요';
      fileNameInput.value = 'reve-신캐스포창';

      bgImage.style.backgroundImage = 'none';
      captureTarget.classList.remove('has-image');

      updatePreview();
    });

    saveBtn.addEventListener('click', async () => {
      const fileName = (fileNameInput.value.trim() || 'reve-신캐스포창') + '.png';

      try {
        saveBtn.disabled = true;
        saveBtn.textContent = '저장 중...';

        const canvas = await html2canvas(captureTarget, {
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#020305',
          scale: 2
        });

        const link = document.createElement('a');
        link.download = fileName;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (e) {
        alert('이미지 저장 중 오류가 발생했습니다.');
        console.error(e);
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '이미지 저장';
      }
    });

    updatePreview();
  </script>
</body>
</html>
